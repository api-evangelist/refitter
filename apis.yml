  - aid: refitter:refit
    name: Refit
    description: >-
      The type-safe REST library for .NET that Refitter generates interfaces for.
      Refit turns REST APIs into live interfaces by decorating C# interfaces with
      attributes describing the HTTP endpoints, then generating HttpClient calls
      at runtime via Castle DynamicProxy or source generators.
    humanURL: https://reactiveui.github.io/refit/
