apis:
  - aid: refitter:refitter
    name: Refitter
    description: >-
      Refitter is a .NET source generator and CLI tool that produces Refit HTTP
      client interfaces from OpenAPI 2.0 and 3.x specifications. Supports
      compile-time code generation via MSBuild source generators and on-demand
      generation via the dotnet-refitter global tool. Generates C# interfaces,
      model classes, and optional Refit settings for use with the Refit
      HttpClient library.
    humanURL: https://github.com/christianhelle/refitter
