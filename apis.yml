aid: refitter
name: Refitter
description: >-
  Refitter is a .NET tool and source generator that produces Refit HTTP client
  interfaces from OpenAPI specifications. It runs at compile time as a source
  generator or as a standalone CLI tool (dotnet-refitter), enabling type-safe
  API consumption in .NET projects. Refitter reads OpenAPI 2.0 (Swagger) and
  OpenAPI 3.x specifications and generates strongly-typed C# interface
  definitions and model classes compatible with the Refit library.
